<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <h2>Todo List</h2>

        <article class="todo-card" data-testid="test-todo-card">
            <div class="card-header">

                <label for="complete-toggle" 
                       class="checkbox-label">
                     <input type="checkbox" 
                        id="complete-toggle"
                        data-testid="test-todo-complete-toggle"
                        aria-label="Mark task as complete"/>

                        <span class="checkbox-custom" 
                              aria-hidden="true"></span>

                    
                <div>
                     <h2 class="todo-title" data-testid="test-todo-title">
                    Finish homepage design mockups
                </h2>

                <p class="todo-description" 
                  data-testid="test-todo-description">
                Create wireframes and high-fidelity mockups for the new homepage design, ensuring it is responsive and visually appealing across all devices.
               </p>

                     <!-- tags -->
                <ul class="tags-list"
                        data-testid="test-todo-status"
                        role="list"
                        aria-label="Tags">

                    <li class="tag" 
                        data-testid="test-todo-tags-work" 
                        role="list"
                        aria-label="Tag: Work">Work
                    </li>

                    <li class="tag"
                     data-testid="test-todo-tag-urgent"
                    role="list"
                     aria-label="Tag: Urgent">Urgent</li>

                     <li class="tag"
                     data-testid="test-todo-tag-design" 
                    role="list"
                     aria-label="Tag: Design">Design</li>

                     
                </ul>
                </div>
                
                </label>

                

                  <div class="date-time">
                    <!-- due date -->
                <div class="dates-row">
                    <time class="due-date" 
                          data-testid="test-todo-due-date"
                          datetime="2026-12-04"
                          aria-label="Due date: April 12, 2026">
                    Due: April 12, 2026
                    </time>

                    <span class="time-remaining" 
                          data-testid="test-todo-time-remaining"
                          aria-live="polite"
                          aria-label="Time remaining: 2 weeks">
                          Due in 2 weeks
                    </span>
                </div>


               <div class="card-details">
                 <!-- badges -->
                <div class="badges-row">
                 <span class="badge priority-high" 
                       data-testid="test-todo-priority"
                       aria-label="Priority: High">High</span>
                 <span class="badge status-pending" 
                        data-testid="test-todo-status" 
                       aria-label="Status: Pending">In Progress</span>
                </div>

                  </div>


              

              
               </div>

                


                <!-- actions -->
                <div class="actions-row">
                    <button class="btn-edit" 
                            data-testid="test-todo-edit-button"
                            aria-label="Edit task">
                        Edit
                    </button>

                    <button class="btn-delete" 
                            data-testid="test-todo-delete-button"
                            aria-label="Delete task">
                        Delete
                    </button>
                </div>

               

            </div>




               
        </article>
    </main>
    
</body>



<script src="script.js">
    
</script>

</html>
